<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yumí 米米美學｜重定向中</title>
    <meta http-equiv="refresh" content="0; url=/Yumi-Beauty-Assistant/#/" />
    <script>
      const path = window.location.pathname.replace(/\/$/, '');
      const redirectPath = path === '' ? '/' : path;
      const target = `/Yumi-Beauty-Assistant/#${redirectPath}${window.location.search}${window.location.hash}`;
      window.location.replace(target);
    </script>
  </head>
  <body></body>
</html>
